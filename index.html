                                                                </div>
                                                            </div>
                                                        )})}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    <div className="pt-6 mt-4">
                                        {inputMode === 'omr' ? (
                                            <button 
                                                onClick={processAll} 
                                                disabled={isProcessing || images.length === 0} 
                                                className="w-full py-6 bg-indigo-600 text-white rounded-[1.5rem] font-black text-xl shadow-2xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all disabled:bg-slate-300 disabled:text-slate-500 disabled:shadow-none disabled:translate-y-0 flex justify-center items-center gap-4"
                                            >
                                                {isProcessing ? <Icon name="Loader2" size={28}/> : <Icon name="CheckCircle" size={28}/>}
                                                {isProcessing ? "초고속 모드로 분석 중입니다..." : `${images.length}장의 OMR 채점 시작`}
                                            </button>
                                        ) : (
                                            <button 
                                                onClick={processManual} 
                                                disabled={isProcessing} 
                                                className="w-full py-6 bg-teal-600 text-white rounded-[1.5rem] font-black text-xl shadow-2xl shadow-teal-200 hover:bg-teal-700 hover:-translate-y-1 transition-all disabled:bg-slate-300 disabled:text-slate-500 disabled:shadow-none disabled:translate-y-0 flex justify-center items-center gap-4"
                                            >
                                                {isProcessing ? <Icon name="Loader2" size={28}/> : <Icon name="Save" size={28}/>}
                                                {isProcessing ? "저장 중..." : `직접 입력 채점 결과 저장`}
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )}

                            {view === 'results' && (
                                <div className="space-y-8 animate-in">
                                    <div className="flex flex-col sm:flex-row justify-between items-center gap-4 px-2">
                                        <div className="text-center sm:text-left">
                                            <h2 className="font-black text-3xl text-slate-800">
                                                채점 리포트 <span className="text-lg text-indigo-600 ml-2">[{selectedUnit}]</span>
                                            </h2>
                                            <p className="text-sm text-slate-400 font-bold mt-1 uppercase tracking-widest">Total {filteredResults.length} results shown</p>
                                        </div>
                                        <div className="flex gap-3 w-full sm:w-auto items-center flex-wrap justify-center sm:justify-end">
                                            <input 
                                                type="text" 
                                                placeholder="학생 이름/학교 검색..." 
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="border-2 border-slate-200 px-4 py-2.5 rounded-xl text-sm font-bold outline-none focus:border-indigo-500 w-full sm:w-48 bg-white shadow-sm"
                                            />
                                            <button 
                                                onClick={deleteSelectedResults} 
                                                disabled={selectedResultIds.length === 0 || isProcessing} 
                                                className="bg-rose-50 text-rose-600 border border-rose-200 px-4 py-3 rounded-xl text-sm font-black hover:bg-rose-100 transition-all flex items-center justify-center gap-1 disabled:bg-slate-50 disabled:text-slate-400 disabled:border-slate-200"
                                                title="선택된 데이터를 클라우드 및 시트에서 일괄 삭제합니다"
                                            >
                                                <Icon name="Trash2" size={16}/> 삭제
                                            </button>
                                            
                                            <button 
                                                onClick={saveToSheets} 
                                                disabled={selectedResultIds.length === 0 || isProcessing} 
                                                className="bg-emerald-600 text-white px-6 py-3 rounded-xl text-sm font-black shadow-xl shadow-emerald-100 hover:bg-emerald-700 transition-all flex items-center justify-center gap-2 disabled:bg-slate-200 disabled:shadow-none"
                                            >
                                                {isProcessing ? <Icon name="Loader2" size={18}/> : <Icon name="Save" size={18}/>} 
                                                선택 항목 전송 ({selectedResultIds.length})
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="border-2 border-slate-50 rounded-[2rem] overflow-hidden bg-white shadow-2xl">
                                        <div className="overflow-x-auto custom-scrollbar">
                                            <table className="w-full text-left table-fixed min-w-[1000px]">
                                                <thead className="bg-slate-50/50 border-b border-slate-100">
                                                    <tr>
                                                        <th className="py-2 px-1 text-center w-10">
                                                            <input 
                                                                type="checkbox" 
                                                                className="w-4 h-4 rounded-md border-gray-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer shadow-sm"
                                                                checked={isAllSelected && unsentFilteredResults.length > 0}
                                                                onChange={(e) => {
                                                                    if (e.target.checked) {
                                                                        const newIds = new Set([...selectedResultIds, ...unsentFilteredResults.map(r => r.id)]);
                                                                        setSelectedResultIds(Array.from(newIds));
                                                                    } else {
                                                                        const filteredIds = unsentFilteredResults.map(r => r.id);
                                                                        setSelectedResultIds(prev => prev.filter(id => !filteredIds.includes(id)));
                                                                    }
                                                                }}
                                                            />
                                                        </th>
                                                        <th className="py-2 px-1 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] w-[110px]">학생 이름</th>
                                                        <th className="py-2 px-1 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] w-[140px]">학교 / 시험지명</th>
                                                        <th className="py-2 px-1 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] text-center w-auto">문항별 학생 답안</th>
                                                        <th className="py-2 px-1 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] text-center w-[70px]">객관식</th>
                                                        <th className="py-2 px-1 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] text-center w-[70px]">주관식</th>
                                                        <th className="py-2 px-1 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] text-center w-[90px]">최종 총점</th>
                                                        <th className="py-2 px-1 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] text-center w-[90px]">수정/개별삭제</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {filteredResults.length === 0 ? (
                                                        <tr><td colSpan="8" className="p-10 text-center text-slate-400 font-bold">이 시험지에 대한 채점 결과가 없습니다. (과거 결과는 [삭제]하거나 [시험지 관리]에서 확인하세요)</td></tr>
                                                    ) : (
                                                        filteredResults.map(r => {
                                                            const examData = getExamData(r.unit);
                                                            const hasSubjective = examData.subjective && examData.subjective.length > 0;
                                                            const subjectiveSum = r.subjectiveScores ? r.subjectiveScores.reduce((a,b)=>a+b, 0) : 0;
                                                            const needsAttention = r.name === "이름 입력 필요" || (hasSubjective && subjectiveSum === 0);

                                                            const displayCount = Math.min(examData.objective.length || 20, 20);

                                                            return (
                                                            <tr key={r.id} className="hover:bg-indigo-50/30 transition-colors">
                                                                <td className="py-1.5 px-1 text-center">
                                                                    {r.isSentToSheet ? (
                                                                        <span className="inline-flex items-center justify-center bg-emerald-50 text-emerald-500 rounded-lg w-6 h-6 shadow-sm border border-emerald-100" title="전송 완료">
                                                                            <Icon name="CheckCircle" size={14}/>
                                                                        </span>
                                                                    ) : (

                                                                                            ? r.details.slice(0, displayCount).map((d, i) => <td key={'q'+i} className="px-1.5 py-0.5 border-r border-slate-100">{d?.question || (i + 1)}</td>) 
                                                                                            : Array.from({length: displayCount}).map((_, i) => <td key={'qe'+i} className="px-1.5 py-0.5 border-r border-slate-100">{i + 1}</td>)}

                                                                                    <tr className="text-slate-700">

                                                                                            ? r.details.slice(0, displayCount).map((d, i) => {

                                                                </td>

                                                                        <button onClick={() => deleteSingleResult(r.id)} className="px-2 py-1.5 rounded-md text-[10px] font-black bg-rose-50 text-rose-500 border border-rose-100 hover:bg-rose-500 hover:text-white transition-all flex items-center justify-center gap-1 shadow-sm w-full">
                                                                            <Icon name="Trash2" size={10}/> 개별 삭제
                                                                        </button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                            );
                                                        })

                                                </tbody>
                                            </table>

                                    </div>

                                            <p className="font-bold text-slate-400">데이터가 없습니다. OMR을 스캔하여 채점 결과를 쌓아주세요.</p>

                                        <>
                                            <div className="bg-white p-8 rounded-[2rem] border-2 border-slate-50 shadow-xl space-y-6">

                                                        value={analysisStudent}

                                                    </select>
                                                </div>

                                                        <div className="w-full bg-indigo-50/40 p-6 rounded-3xl border border-indigo-100 shadow-sm">
                                                            <ComboChart 
                                                                data={studentChartData.totalScores} 
                                                                labels={studentChartData.labels} 
                                                                title={`전체 점수(총점) 추이`} 
                                                                lineLabel="총점 추세선" 
                                                                barLabel="시험지별 총점" 
                                                                lineColor="#4f46e5" 
                                                                barColor="#c7d2fe" 
                                                                maxScore={100} 
                                                            />

                                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

                                                                    data1={studentChartData.objCorrectCounts}

                                                                    labels={studentChartData.labels}

                                                                    label1="맞힌 개수" 
                                                                    label2="전체 문항 수" 
                                                                    color1="#0d9488" 
                                                                    color2="#ccfbf1" 
                                                                />
                                                            </div>
                                                            <div className="bg-rose-50/40 p-6 rounded-3xl border border-rose-100 shadow-sm">

                                                                    labels={studentChartData.labels} 
                                                                    title={`주관식 획득 점수`} 
                                                                    label1="획득 점수" 
                                                                    label2="전체 배점" 
                                                                    color1="#e11d48" 
                                                                    color2="#ffe4e6" 
                                                                />

                                                            <ComboChart 
                                                                data={examOverviewData.objAverages} 
                                                                labels={examOverviewData.labels} 
                                                                title={`전체 시험지별 객관식 평균 점수`} 
                                                                lineLabel="객관식 평균선" 
                                                                barLabel="객관식 평균점수" 
                                                                lineColor="#0ea5e9" 
                                                                barColor="#e0f2fe" 
                                                                maxScore={100} 
                                                            />
                                                        </div>

                                                            <ComboChart 
                                                                data={examOverviewData.subjAverages}

                                                                barColor="#fce7f3" 
                                                                maxScore={100}

                                                </div>
                                                <div className="flex flex-col gap-3">
                                                    <label className="text-xs font-black text-indigo-400 uppercase tracking-[0.2em] ml-2">학교명 (선택)</label>

                                                    <div className="flex flex-col gap-3">
                                                        <label className="text-xs font-black text-pink-400 uppercase tracking-[0.2em] ml-2">주관식 문항 수</label>

                                                    </div>
                                                </div>

                                                        ))}

                                                        <div className="w-16 shrink-0 text-right pr-2 text-xs font-black text-indigo-500">정답</div>

                                                                key={`a-${idx}`}

                                                        ))}

                                                                        className="w-full border-2 border-slate-50 p-2 rounded-lg text-center font-black text-pink-600 focus:border-pink-500 outline-none bg-slate-50 hover:bg-white transition-all text-lg" 
                                                                    />
                                                                    <span className="text-xs font-bold text-slate-400">점</span>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            <button onClick={saveNewExam} className="w-full py-6 bg-indigo-600 text-white rounded-[1.5rem] font-black text-xl shadow-2xl shadow-indigo-100 hover:bg-indigo-700 transition-all flex justify-center items-center gap-4">
                                                <Icon name="Save" size={24}/> {editingExamKey ? '수정 내용 저장' : '정답지 저장 및 바로 사용'}
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                                            {Object.keys(answerKeys).map(unit => {
                                                const examData = getExamData(unit);
                                                return (
                                                <div key={unit} className="bg-white p-8 rounded-[2rem] border-2 border-slate-50 shadow-xl flex flex-col gap-6 relative group hover:border-indigo-200 transition-all duration-300">
                                                    <div className="absolute top-6 right-6 flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                                                        <button 
                                                            onClick={() => {
                                                                setEditingExamKey(unit);
                                                                setNewExamName(unit);
                                                                setNewExamSchool(examData.school);
                                                                setNewExamLength(examData.objective.length);
                                                                setNewExamAnswers([...examData.objective]);
                                                                setNewExamObjScores(examData.objectiveScores ? [...examData.objectiveScores] : Array(examData.objective.length).fill(1));
                                                                setNewExamSubLength(examData.subjective.length);
                                                                setNewExamSubScores([...examData.subjective]);
                                                                setIsAddingExam(true);
                                                            }} 
                                                            className="text-slate-300 hover:text-indigo-500 bg-white rounded-full p-2 shadow-md border border-slate-50"
                                                        >
                                                            <Icon name="Edit" size={18}/>
                                                        </button>
                                                        <button 
                                                            onClick={() => { if(confirm("삭제하시겠습니까?")) deleteExam(unit); }} 
                                                            className="text-slate-300 hover:text-red-500 bg-white rounded-full p-2 shadow-md border border-slate-50"
                                                        >
                                                            <Icon name="Trash2" size={18}/>
                                                        </button>
                                                    </div>
                                                    <div className="font-black text-2xl text-slate-800 flex items-center gap-4 mt-2">
                                                        <div className="bg-indigo-50 p-3 rounded-2xl"><Icon name="FileText" size={24} className="text-indigo-500"/></div>
                                                        <span className="truncate pr-8">{unit}</span>
                                                    </div>

                                                        <p className="text-[10px] text-slate-300 font-black uppercase mb-3 tracking-[0.2em]">Objective Map Overview</p>

                                                            {examData.objective.join(' ')}
                                                        </div>

                                                    <div className="flex justify-between items-center pt-2">
                                                        <div className="flex gap-2">
                                                            <span className="text-xs font-black bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full border border-indigo-100">객관식 {examData.objective.length}</span>
                                                            {examData.subjective.length > 0 && (
                                                                <span className="text-xs font-black bg-pink-50 text-pink-600 px-4 py-1.5 rounded-full border border-pink-100">주관식 {examData.subjective.length}</span>
                                                            )}
                                                        </div>
                                                        <button 
                                                            onClick={() => { setSelectedUnit(unit); setView('upload'); }} 
                                                            className="text-xs font-black text-slate-400 hover:text-indigo-600 flex items-center gap-2 transition-all group-hover:translate-x-1"
                                                        >
                                                            선택 <Icon name="ChevronRight" size={16}/>
                                                        </button>
                                                    </div>
                                                </div>
                                            )})}
                                        </div>
                                    )}
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="space-y-10 animate-in">
                                    <div className="bg-amber-50 p-8 rounded-[2.5rem] border-2 border-amber-100 text-amber-900 space-y-6 shadow-sm">
                                        <div className="flex items-center gap-4 mb-4">
                                            <div className="bg-amber-100 p-3 rounded-2xl"><Icon name="AlertCircle" size={24} className="text-amber-600" /></div>
                                            <p className="font-black text-lg tracking-tight">구글 시트 연동 및 보안 설정 가이드</p>
                                        </div>
                                        <ul className="list-disc ml-6 space-y-3 font-bold text-sm text-amber-800/80 leading-relaxed">
                                            <li>원장님의 API 키는 파일 내부에 저장되지 않으며, 오직 이 브라우저 안에만 안전하게 보관됩니다.</li>
                                            <li>구글 시트 메뉴에서 <strong>[확장 프로그램] &gt; [Apps Script]</strong>를 실행하여 GAS 서버 코드를 적용하세요.</li>
                                            <li>액세스 권한을 반드시 <strong>'모든 사용자(Anyone)'</strong>로 설정해야 합니다.</li>
                                        </ul>
                                    </div>

                                    <div className="space-y-8">
                                        <div className="flex flex-col gap-3">
                                            <label className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Google Apps Script Web App URL</label>
                                            <input 
                                                type="text" 
                                                value={gasUrl} 
                                                onChange={(e) => {
                                                    setGasUrl(e.target.value);
                                                    localStorage.setItem('omr_gas_url', e.target.value);
                                                }}
                                                placeholder="https://script.google.com/macros/s/.../exec" 
                                                className="w-full border-2 border-slate-100 p-5 rounded-2xl text-sm font-black outline-none focus:border-indigo-500 shadow-sm bg-white transition-all text-indigo-900" 
                                            />
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <label className="text-xs font-black text-indigo-400 uppercase tracking-[0.2em] ml-2">Gemini API 키 <span className="text-slate-400">(필수)</span></label>
                                            <input 
                                                type="password" 
                                                value={userApiKey} 
                                                onChange={(e) => {
                                                    setUserApiKey(e.target.value);
                                                    localStorage.setItem('omr_api_key', e.target.value);
                                                }}
                                                placeholder="AI 분석을 위한 새로운 API 키를 이곳에 붙여넣어주세요" 
                                                className="w-full border-2 border-indigo-100 p-5 rounded-2xl text-sm font-black outline-none focus:border-indigo-500 shadow-sm bg-white transition-all text-indigo-900" 
                                            />
                                            <p className="text-[10px] text-slate-400 mt-1 ml-2 font-bold">
                                                새로운 API 키를 붙여넣으시면, 컴퓨터(또는 폰)가 기억해 둡니다.
                                            </p>
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <label className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-2">시스템 데이터 백업 (JSON)</label>
                                            <textarea 
                                                rows="6" 
                                                value={JSON.stringify(answerKeys, null, 2)} 
                                                onChange={(e)=> { try { setAnswerKeys(JSON.parse(e.target.value)); } catch(err){} }} 
                                                className="w-full border-2 border-slate-100 p-5 rounded-2xl font-mono text-[10px] outline-none focus:border-indigo-500 shadow-sm bg-white transition-all text-slate-500" 
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                        
                        <footer className="bg-slate-50/50 p-8 border-t border-slate-100 text-center">
                            <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Engineered by Google Apps Script & React</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <!-- Firebase 연동 모듈 -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAfM4dIVjANychGT2798HTEQvwSxXRRWyQ",
        authDomain: "mathkind-142d4.firebaseapp.com",
        projectId: "mathkind-142d4",
        storageBucket: "mathkind-142d4.firebasestorage.app",
        messagingSenderId: "919722012853",
        appId: "1:919722012853:web:9b051d3f0f037a1af68efc"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.fetchFromFirebase = async () => {
        try {
          const querySnapshot = await getDocs(collection(db, "haeun_omr_data"));
          const fetchedResults = [];
          querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();
            let ts = new Date().toLocaleString();
            if (data.savedAt) {
                if (typeof data.savedAt.toDate === 'function') ts = data.savedAt.toDate().toLocaleString();
                else ts = new Date(data.savedAt).toLocaleString();
            } else if (data.timestamp) {
                ts = data.timestamp;
            }

            fetchedResults.push({
              id: docSnap.id,
              name: data.studentName || data.name || "이름 없음",
              school: data.school || "",
              info: data.info || "",
              unit: data.examUnit || data.unit || "",
              objectiveScore: data.objectiveScore || 0,
              subjectiveScores: data.subjectiveScores || [],
              totalScore: data.totalScore || 0,
              details: data.answers || data.details || [],
              timestamp: ts,
              isSentToSheet: data.isSentToSheet !== undefined ? data.isSentToSheet : true
            });
          });
          return fetchedResults.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        } catch (error) {
          console.error("Firebase 데이터 불러오기 실패:", error);
          return [];
        }
      };

      window.addResultToFirebase = async (result) => {
        try {
          await setDoc(doc(db, "haeun_omr_data", result.id), {
              name: result.name,
              studentName: result.name, 
              school: result.school,
              unit: result.unit,
              examUnit: result.unit, 
              objectiveScore: result.objectiveScore,
              subjectiveScores: result.subjectiveScores,
              totalScore: result.totalScore,
              details: result.details,
              answers: result.details, 
              isSentToSheet: result.isSentToSheet,
              timestamp: result.timestamp,
              savedAt: new Date()
          });
        } catch (error) {
          console.error("Firebase 저장 실패:", error);
        }
      };

      window.updateResultInFirebase = async (id, updateData) => {
        try {
          await updateDoc(doc(db, "haeun_omr_data", id), updateData);
        } catch (error) {
          console.error("Firebase 업데이트 실패:", error);
        }
      };

      window.deleteResultsFromFirebase = async (ids) => {
          try {
              for (const id of ids) {
                  await deleteDoc(doc(db, "haeun_omr_data", id));
              }
          } catch (error) {
              console.error("Firebase Delete Error:", error);
              throw error;
          }
      };

      window.deleteAllResultsInFirebase = async () => {
        try {
          const querySnapshot = await getDocs(collection(db, "haeun_omr_data"));
          querySnapshot.forEach((docSnap) => {
            deleteDoc(doc(db, "haeun_omr_data", docSnap.id));
          });
        } catch (error) {
          console.error("Firebase 전체 삭제 실패:", error);
        }
      };

      window.fetchExamsFromFirebase = async () => {
        try {
          const querySnapshot = await getDocs(collection(db, "haeun_omr_settings"));
          let examsData = null;
          querySnapshot.forEach((docSnap) => {
            if (docSnap.id === "exam_keys") examsData = docSnap.data().data;
          });
          return examsData ? JSON.parse(examsData) : null;
        } catch (error) {
          console.error("Firebase 시험지 불러오기 실패:", error);
          return null;
        }
      };

      window.saveExamsToFirebase = async (e) => {
        try {
          await setDoc(doc(db, "haeun_omr_settings", "exam_keys"), { data: JSON.stringify(e) });
        } catch (error) {
          console.error("Firebase 시험지 저장 실패:", error);
        }
      };
    </script>
</body>
</html>
